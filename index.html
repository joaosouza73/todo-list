<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Lista de Tarefas</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Digite uma Tarefa">
            <button id="addTaskBtn">Adicionar</button>
        </div>

        <button id="startTaskBtn">Iniciar Tarefa(s)</button>
        <button id="finishTaskBtn">Finalizar Tarefa(s)</button>

        <div class="lists-container">

            <div class="list-box">
                <h2>A Fazer</h2>
                <ul id="todoList"></ul>
            </div>

            <div class="list-box">
                <h2>Fazendo</h2>
                <ul id="doingList"></ul>
            </div>

            <div class="list-box">
                <h2>Feitas essa Semana</h2>
                <ul id="weekTasks"></ul>
            </div>

        </div>
    </div>
    
<script src="script.js"></script>

</body>
</html>
